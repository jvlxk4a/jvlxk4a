<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dyzio – Mały Pies</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            text-align: center;
            padding: 50px;
        }
        .dyzio {
            background: #fff;
            display: inline-block;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .dyzio img {
            max-width: 300px;
            border-radius: 15px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #ff6f61;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #ff3b2e;
        }
    </style>
</head>
<body>
    <div class="dyzio">
        <h1>🐾 Dyzio 🐾</h1>
        <img src="https://place-puppy.com/300x300" alt="Dyzio, mały pies">
        <p id="opis">Dyzio to mały pies o umaszczeniu brązowo-czarnym. Jest trochę autystyczny, słodki bardzo i ma czarną kropkę na końcu języka. Każdy go kocha!</p>
        <button onclick="zmienOpis()">Kliknij mnie!</button>
    </div>

    <script>
        function zmienOpis() {
            const opis = document.getElementById('opis');
            opis.textContent = "Dyzio macha ogonem i daje buziaka 😎🐶!";
        }
    </script>
</body>
</html>
